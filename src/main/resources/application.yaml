spring:
  datasource:
    url: jdbc:mysql://localhost:3306/traffic_demo
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 10
      connection-timeout: 250

server:
  port: 8080

traffic:
  strategy: LEAKY_BUCKET # 이 값으로 어떤 Filter를 쓸지 결정
  tps-limit: 15